<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Cloud Lab Group Project</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Contact Us</h1>
      <p class="course-title">Course Title: Cloud Computing Lab</p>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </header>

    <main>
      <section>
        <h2>Get in Touch</h2>
        <p>Have questions about our cloud project? Drop us a message below.</p>

        <form
          class="contact-form"
          onsubmit="
            event.preventDefault();
            alert('Message sent successfully!');
          "
        >
          <label for="name">Name:</label>
          <input type="text" id="name" required placeholder="Your Name" />

          <label for="email">Email:</label>
          <input type="email" id="email" required placeholder="Your Email" />

          <label for="message">Message:</label>
          <textarea
            id="message"
            rows="4"
            required
            placeholder="Your Message..."
          ></textarea>

          <button type="submit">Send Message</button>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 [Insert Group Name]. All rights reserved.</p>
    </footer>
  </body>
</html>
